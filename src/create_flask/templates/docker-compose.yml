services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GUNICORN_BIND=0.0.0.0:8000
      - ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-please}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/app.db}
{% if use_redis %}      - REDIS_URL=redis://redis:6379/0
{% endif %}{% if use_celery %}      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
{% endif %}{% if use_redis %}    depends_on:
      - redis
{% endif %}
{% if use_redis %}  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
{% endif %}{% if use_celery %}
  worker:
    build: .
    command: uv run celery -A wsgi:celery_app worker -l info
    environment:
      - ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-please}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/app.db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
{% endif %}
